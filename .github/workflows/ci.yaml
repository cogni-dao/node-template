name: Node CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('node-ci-pr-{0}', github.event.pull_request.number) || github.event_name == 'merge_group' && format('node-ci-mq-{0}', github.event.merge_group.head_ref) || format('node-ci-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and image
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Resolve build metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MQ_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BUILD_SHA="$PR_HEAD_SHA"
            CHECKOUT_REF="$PR_HEAD_SHA"
            IMAGE_TAG="pr-${PR_NUMBER}-${PR_HEAD_SHA}"
            PUSH_IMAGE="true"
          elif [ "$EVENT_NAME" = "merge_group" ]; then
            PR_PATH="${MQ_HEAD_REF##*/}"
            if [[ ! "$PR_PATH" =~ ^pr-([0-9]+)- ]]; then
              echo "::error::Could not parse PR number from merge_group head_ref: $MQ_HEAD_REF"
              exit 1
            fi
            PR_NUMBER="${BASH_REMATCH[1]}"
            BUILD_SHA="$PUSH_SHA"
            CHECKOUT_REF="$PUSH_SHA"
            IMAGE_TAG="mq-${PR_NUMBER}-${PUSH_SHA}"
            PUSH_IMAGE="true"
          elif [ "$EVENT_NAME" = "push" ]; then
            BUILD_SHA="$PUSH_SHA"
            CHECKOUT_REF="$PUSH_SHA"
            IMAGE_TAG="sha-${PUSH_SHA}"
            PUSH_IMAGE="true"
          else
            echo "::error::Unsupported event: $EVENT_NAME"
            exit 1
          fi
          echo "build_sha=$BUILD_SHA" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "push_image=$PUSH_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: 9.12.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck package closure
        run: pnpm check

      - name: Prepare image metadata
        id: image
        run: |
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner_lc}/${repo_lc}-node" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.meta.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: ${{ steps.meta.outputs.push_image == 'true' }}
          tags: ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.build_sha }}
          cache-from: type=gha,scope=node-template-app
          cache-to: type=gha,mode=max,scope=node-template-app

      - name: Verify pushed image
        if: steps.meta.outputs.push_image == 'true'
        run: docker buildx imagetools inspect "${{ steps.image.outputs.name }}:${{ steps.meta.outputs.image_tag }}"
